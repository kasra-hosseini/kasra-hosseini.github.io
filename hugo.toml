baseURL = "https://kasra-hosseini.com/"
languageCode = "en-us"
title = "Kasra Hosseini"
theme = "PaperMod"

[pagination]
  pagerSize = 100

[params]
    env = "production"
    defaultTheme = "light"
    disableThemeToggle = true
    math = true
    mainSections = ["posts", "papers"]
    author = "Kasra Hosseini"
    description = "Kasra Hosseini (Kasra Hosseini Zad) – Principal Applied Scientist at Zalando, Berlin. Specializing in Machine Learning, Deep Learning, Large Language Models (LLMs), Multimodal LLMs, AI agents, and multi-agent systems for large-scale production systems. Expertise in Natural Language Processing (NLP), Computer Vision, semantic search, and information retrieval. Research interests span LLM fine-tuning, efficient and adaptable models, generative AI, and Data Science. Additional work in AI safety, red teaming, privacy-preserving ML, differential privacy, and federated learning. Previously Research Data Scientist at the Alan Turing Institute and Postdoctoral Researcher at the University of Oxford. 49 peer-reviewed publications, 2500+ citations, h-index 25."
    keywords = [
      "Kasra Hosseini", "Kasra Hosseini Zad", "Kasra Hosseinizad",
      "Seyed Kasra Hosseini Zad", "Seyedkasra Hosseinizad",
      "Kasra Zad", "Hosseini", "Hosseinizad",
      "Machine Learning", "Deep Learning", "Large Language Models", "LLM",
      "AI", "Artificial Intelligence", "AI agents", "multi-agent AI", "multi-agent systems",
      "Multimodal LLMs", "Multimodal Large Language Models",
      "Natural Language Processing", "NLP", "Computer Vision",
      "Semantic Search", "Information Retrieval", "Neural Search",
      "LLM Fine-Tuning", "Efficient ML", "Adaptable ML", "Model Optimization",
      "Generative AI", "LLM Evaluation", "LLM-as-a-Judge",
      "Production ML Systems", "Real-Time ML", "ML Pipelines", "MLOps",
      "Data Science", "ML Engineering",
      "AI Safety", "Red Teaming", "Adversarial ML", "Responsible AI",
      "Privacy-Preserving Machine Learning", "Differential Privacy", "Federated Learning",
      "Applied Scientist", "Zalando", "Zalando AI",
      "Berlin ML", "Berlin LLM", "Berlin AI", "Berlin Machine Learning",
      "Alan Turing Institute", "University of Oxford", "LMU Munich",
      "Seismology", "Geophysics", "Computational Science",
      "DeezyMatch", "MapReader", "obspyDMT", "SubMachine",
      "Digital Humanities", "Historical Maps",
    ]
    images = ["/images/kasra.jpg"]

  [params.schema]
    publisherType = "Person"
    sameAs = [
      "https://github.com/kasra-hosseini",
      "https://scholar.google.com/citations?user=uj3P_0EAAAAJ&hl=en",
      "https://www.linkedin.com/in/kasra-hosseini/",
      "https://orcid.org/0000-0002-5765-8082",
    ]

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
  paper_category = "paper_categories"
  post_category = "post_categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 

